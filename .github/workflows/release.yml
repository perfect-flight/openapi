name: Release

# No merge à main: calcula a próxima versão semver a partir dos commits
# (Conventional Commits), cria a tag vX.Y.Z e o GitHub Release com notas geradas
# automaticamente. A versão da API (info.version) é fixa e não entra aqui.
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Monta as notas do release (CHANGELOG [Unreleased], curado pelo agente)
        if: ${{ steps.tag.outputs.new_tag }}
        env:
          TAG_CHANGELOG: ${{ steps.tag.outputs.changelog }}
        run: |
          awk '/^## \[Unreleased\]/{f=1;next} f&&/^## /{exit} f' CHANGELOG.md | sed '/./,$!d' > notes.md
          # fallback: se o [Unreleased] estiver vazio, usa o changelog dos commits
          if [ ! -s notes.md ]; then printf '%s\n' "$TAG_CHANGELOG" > notes.md; fi

      - name: Create a GitHub release
        if: ${{ steps.tag.outputs.new_tag }}
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          bodyFile: notes.md
